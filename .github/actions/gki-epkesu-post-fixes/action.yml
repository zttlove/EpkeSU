name: Apply EpkeSU post patch fixes
description: Apply EpkeSU GKI fixes that must run after optional SUSFS patches

runs:
  using: composite
  steps:
    - name: Fix EpkeSU GKI warnings
      shell: bash
      run: |
        set -euo pipefail

        SELINUX_HIDE="${{ github.workspace }}/kernel/feature/selinux_hide.c"
        if [ -f "$SELINUX_HIDE" ]; then
          python3 - "$SELINUX_HIDE" <<'PY'
        import sys
        from pathlib import Path

        path = Path(sys.argv[1])
        text = path.read_text()

        if "extern void security_dump_masked_av_fn(" in text:
            lines = text.splitlines(keepends=True)
            fixed = []
            dump_count = 0
            compute_count = 0
            i = 0

            while i < len(lines):
                line = lines[i]
                stripped = line.strip()

                if stripped in (
                    "if (security_dump_masked_av_fn)",
                    "if (security_dump_masked_av_fn != NULL)",
                ):
                    if i + 1 < len(lines):
                        fixed.append("    " + lines[i + 1].lstrip())
                    dump_count += 1
                    i += 2
                    continue

                if stripped in (
                    "if (context_struct_compute_av_fn) {",
                    "if (context_struct_compute_av_fn != NULL) {",
                ):
                    if (
                        i + 4 < len(lines)
                        and "context_struct_compute_av_fn(" in lines[i + 1]
                        and lines[i + 2].strip() == "} else {"
                        and "context_struct_compute_av(" in lines[i + 3]
                        and lines[i + 4].strip() == "}"
                    ):
                        fixed.append("    " + lines[i + 1].lstrip())
                        compute_count += 1
                        i += 5
                        continue

                fixed.append(line)
                i += 1

            text = "".join(fixed)
            print(f"Removed SUSFS extern function checks: dump={dump_count}, compute={compute_count}")
            if dump_count != 1 or compute_count != 1:
                raise SystemExit("EpkeSU post patch fixes did not update the expected SUSFS function checks")

        path.write_text(text)
        PY
        fi
