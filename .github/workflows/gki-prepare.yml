name: Prepare GKI Matrix

on:
  workflow_call:
    inputs:
      config_file:
        required: true
        type: string
      feature_set:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      use_repo:
        required: true
        type: boolean
      use_latest_susfs:
        required: true
        type: boolean
      build_bypass:
        required: true
        type: boolean

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.final.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read config
        id: final
        shell: bash
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
          PATCH_LEVEL: ${{ inputs.os_patch_level }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          const cfg = JSON.parse(fs.readFileSync(process.env.CONFIG_FILE, "utf8"));
          const patch = process.env.PATCH_LEVEL;
          const [androidVersion, kernelVersion] = cfg.version.split("-");

          let items;
          if (patch === "all") {
            items = cfg.include;
          } else if (patch === "latest") {
            items = [cfg.include.filter((item) => item.date !== "lts").at(-1)];
          } else {
            items = cfg.include.filter((item) => item.date === patch);
          }

          items = items.filter(Boolean);
          if (items.length === 0) {
            throw new Error(`No GKI config entries matched patch level ${patch}`);
          }

          const seen = new Set();
          const include = [];
          for (const item of items) {
            const entry = {
              version: cfg.version,
              android_version: androidVersion,
              kernel_version: kernelVersion,
              sublevel: item.sublevel,
              os_patch_level: item.date,
              variant: "Normal",
            };
            const key = JSON.stringify(entry);
            if (!seen.has(key)) {
              seen.add(key);
              include.push(entry);
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include })}\n`);
          NODE

  build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/gki-build.yml
    with:
      version: ${{ matrix.version }}
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      sublevel: ${{ matrix.sublevel }}
      os_patch_level: ${{ matrix.os_patch_level }}
      variant: ${{ matrix.variant }}
      feature_set: ${{ inputs.feature_set }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit
