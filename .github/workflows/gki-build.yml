name: Build GKI Kernel

permissions:
  contents: read
  actions: write

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sublevel:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      variant:
        required: true
        type: string
      feature_set:
        required: true
        type: string
      use_repo:
        required: true
        type: boolean
      use_latest_susfs:
        required: true
        type: boolean
      build_bypass:
        required: true
        type: boolean

jobs:
  build-gki:
    name: "${{ inputs.kernel_version }}.${{ inputs.sublevel }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }} (${{ inputs.feature_set }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout EpkeSU
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Setup swap
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 16

      - name: Setup build environment
        uses: ./.github/actions/gki-setup-build-environment

      - name: Download GKI source
        uses: ./.github/actions/gki-download-kernel
        with:
          version: ${{ inputs.version }}
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          os_patch_level: ${{ inputs.os_patch_level }}
          use_repo: ${{ inputs.use_repo }}

      - name: Set build timestamp
        shell: bash
        run: |
          set -euo pipefail

          OS_PATCH_LEVEL_INPUT="${{ inputs.os_patch_level }}"
          if [[ "$OS_PATCH_LEVEL_INPUT" == lts* ]]; then
            OS_PATCH_LEVEL_YM="$(date -u +%Y-%m)"
          else
            OS_PATCH_LEVEL_YM="$OS_PATCH_LEVEL_INPUT"
          fi

          FIXED_BUILD_DATE="${OS_PATCH_LEVEL_YM}-05 04:20:00 UTC"
          SOURCE_DATE_EPOCH="$(date -u -d "$FIXED_BUILD_DATE" +%s)"
          KBUILD_TS="$(date -u -d "@${SOURCE_DATE_EPOCH}" '+%a %b %d %H:%M:%S UTC %Y')"
          GIT_DATE="$(date -u -d "@${SOURCE_DATE_EPOCH}" '+%Y-%m-%dT%H:%M:%SZ')"

          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_TIMESTAMP=$KBUILD_TS" >> "$GITHUB_ENV"
          echo "GIT_COMMITTER_DATE=$GIT_DATE" >> "$GITHUB_ENV"
          echo "GIT_AUTHOR_DATE=$GIT_DATE" >> "$GITHUB_ENV"

      - name: Extract sublevel and file name
        id: extract
        uses: ./.github/actions/gki-extract-sublevel-file-name
        with:
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          sublevel: ${{ inputs.sublevel }}
          os_patch_level: ${{ inputs.os_patch_level }}
          variant: ${{ inputs.variant }}

      - name: Kernel fixes
        uses: ./.github/actions/gki-kernel-fixes
        with:
          version: ${{ inputs.version }}
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          sublevel: ${{ steps.extract.outputs.sublevel }}
          os_patch_level: ${{ inputs.os_patch_level }}

      - name: Setup EpkeSU
        uses: ./.github/actions/gki-epkesu
        with:
          enable_susfs: ${{ contains(inputs.feature_set, 'SUSFS') }}

      - name: Setup SUSFS
        if: ${{ contains(inputs.feature_set, 'SUSFS') }}
        uses: ./.github/actions/gki-susfs
        with:
          use_latest_commits: ${{ inputs.use_latest_susfs }}
          version: ${{ inputs.version }}
          android_version: ${{ inputs.android_version }}
          kernel_version: ${{ inputs.kernel_version }}
          os_patch_level: ${{ inputs.os_patch_level }}
          sublevel: ${{ steps.extract.outputs.sublevel }}

      - name: Apply EpkeSU post patch fixes
        uses: ./.github/actions/gki-epkesu-post-fixes

      - name: Setup misc configs
        uses: ./.github/actions/gki-misc
        with:
          version: ${{ inputs.version }}
          kernel_version: ${{ inputs.kernel_version }}
          android_version: ${{ inputs.android_version }}
          sublevel: ${{ steps.extract.outputs.sublevel }}
          variant: ${{ inputs.variant }}

      - name: Apply device patches
        uses: ./.github/actions/gki-apply-device-patches
        with:
          version: ${{ inputs.version }}
          kernel_version: ${{ inputs.kernel_version }}

      - name: Apply EpkeSU branding
        uses: ./.github/actions/gki-apply-kernel-branding
        with:
          variant: ${{ inputs.variant }}
          kernel_version: ${{ inputs.kernel_version }}
          android_version: ${{ inputs.android_version }}
          version: ${{ inputs.version }}
          sublevel: ${{ steps.extract.outputs.sublevel }}

      - name: Remove protected exports
        uses: ./.github/actions/gki-remove-protected-exports

      - name: Clean kernel flags
        uses: ./.github/actions/gki-clean-kernel-flags

      - name: Scan patch rejects
        id: scan
        if: ${{ always() }}
        uses: ./.github/actions/gki-scan-patch-rejects

      - name: Upload rejects
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.extract.outputs.file_name || 'gki' }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9

      - name: Build normal kernel
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
          KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
        uses: ./.github/actions/gki-build-kernel
        with:
          version: ${{ inputs.version }}
          bypass: false

      - name: Build bypass kernel
        if: ${{ inputs.build_bypass }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
          KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
        uses: ./.github/actions/gki-build-kernel
        with:
          version: ${{ inputs.version }}
          bypass: true

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.extract.outputs.file_name }}-${{ inputs.feature_set }}-AnyKernel3
          path: ${{ github.workspace }}/.gki/AnyKernel3/**
          if-no-files-found: error
          compression-level: 9
